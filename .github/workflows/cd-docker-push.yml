name: CD - Docker Build and Push

on:
  push:
    branches: [ "develop", "main" ]

# 동일 브랜치에서 새 커밋 시 이전 배포 작업 취소
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # 주요 브랜치에서만 캐시를 업데이트하도록 설정
        cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build bootJar with Gradle
      # 테스트를 제외하고 배포용 jar만 빠르게 생성 (CI 워크플로우가 병렬로 테스트 중임)
      run: ./gradlew clean bootJar -x test

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/delivhub:${{ github.ref_name == 'main' && 'latest' || 'dev-latest' }}
          ${{ secrets.DOCKER_USERNAME }}/delivhub:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
